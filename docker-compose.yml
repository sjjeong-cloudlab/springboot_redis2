version: "3.8"
services:
  redis-server:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    networks:
      - session-net

  app-1:
    build: .
    container_name: app-1
    environment:
      - SERVER_PORT=8080
    depends_on:
      - redis-server
    networks:
      - session-net

  app-2:
    build: .
    container_name: app-2
    environment:
      - SERVER_PORT=8080
    depends_on:
      - redis-server
    networks:
      - session-net

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes: # host의 nginx.conf를 컨테이너의 nginx.conf로 마운트
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app-1
      - app-2
    networks:
      - session-net

networks:
  session-net:
    driver: bridge
